name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Prisma Generate
      run: npx prisma generate

    - name: Lint codebase
      run: npm run lint

    - name: Run API Tests
      run: npm run test

    - name: Validate Next.js build
      run: npm run build
      env:
        # Provide dummy variables needed for build checks
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dummy"
        DATABASE_URL: "postgresql://dummy:password@localhost/dummy"
